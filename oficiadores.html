<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Encuentra el oficiador que necesitas en COLMENA HUB. Electricistas, plomeros, carpinteros y más.">
  <title>Oficiadores – COLMENA HUB</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background:#FFFBEB; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    .card { transition:all .25s ease; border-left:4px solid transparent; }
    .card:hover { transform:translateY(-3px); border-left-color:#FBBF24; box-shadow:0 8px 24px rgba(251,191,36,.15); }
    .pill { display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:600; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <img src="colmena-hubLOGO.png" alt="COLMENA HUB" class="h-10 w-auto">
        <span class="font-bold text-xl text-gray-900">COLMENA HUB</span>
      </a>
      <a href="apply.html" class="text-sm font-medium text-amber-600 hover:text-amber-700">
        <i class="fas fa-user-plus mr-1"></i>Regístrate como oficiador
      </a>
    </div>
  </header>

  <!-- Búsqueda -->
  <div class="bg-gradient-to-r from-amber-500 to-yellow-400 py-10 px-4">
    <div class="max-w-2xl mx-auto text-center">
      <h1 class="text-3xl font-bold text-black mb-2">Oficiadores Verificados</h1>
      <p class="text-yellow-300 mb-6">Electricistas, plomeros, carpinteros, mecánicos y más</p>
      <div class="relative">
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input id="search" type="text" placeholder="Busca por oficio, especialidad..."
               class="w-full pl-12 pr-4 py-4 rounded-xl text-gray-800 text-base shadow-lg border-0 outline-none focus:ring-2 focus:ring-white">
      </div>
    </div>
  </div>

  <!-- Categorías -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    <div id="categories-grid" class="space-y-8"></div>

    <!-- Sin resultados -->
    <div id="no-results" class="hidden text-center py-16">
      <i class="fas fa-search text-4xl text-gray-300 mb-4"></i>
      <h3 class="text-xl font-bold text-gray-600 mb-2">Sin resultados</h3>
      <p class="text-gray-500">Intenta con otro término o <a href="professions-list.html" class="text-amber-600 underline">busca un profesionista</a>.</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white mt-16">
    <div class="max-w-7xl mx-auto px-4 py-8 flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-3">
        <img src="colmena-hubLOGO.png" alt="" class="h-8 w-auto opacity-80">
        <span class="font-bold">COLMENA HUB</span>
      </div>
      <p class="text-gray-400 text-sm">© 2025 COLMENA HUB. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script>
    const OFICIOS = [
      {
        cat: "🧹 Limpieza, Mantenimiento y Servicios Generales",
        color: "bg-gray-100 text-gray-800",
        items: [
          "Afinador de pianos", "Afilador de cuchillos", "Ama de llaves", "Boleador",
          "Cargador", "Fumigador", "Limpia piscinas", "Limpia vidrios", "Mucama",
          "Personal de limpieza", "Portero", "Recolección de basura", "Retiro de escombros"
        ]
      },
      {
        cat: "🏗️ Construcción, Oficios Técnicos y Reparación",
        color: "bg-yellow-100 text-yellow-800",
        items: [
          "Albañil", "Blindador", "Carpintero", "Cerrajero", "Chalan",
          "Electricista (técnico)", "Herrero", "Mecánico", "Pintor", "Plomero",
          "Técnico en climatización", "Técnico en refrigeración", "Técnicos en reparación",
          "Técnico industrial", "Tornero", "Vidriero", "Zapatero"
        ]
      },
      {
        cat: "🚚 Transporte, Logística y Mensajería",
        color: "bg-blue-100 text-blue-800",
        items: [
          "Chofer", "Grúas (operador de grúa)", "Mensajero", "Mudanzas",
          "Personal de almacén", "Valet parking"
        ]
      },
      {
        cat: "🍽️ Alimentos, Bebidas y Servicios de Restaurante",
        color: "bg-red-100 text-red-800",
        items: [
          "Ayudante de cocina", "Barista", "Bartender", "Carnicero", "Cocinero",
          "Comida para eventos (servicio de catering)", "Hostess", "Lavaplatos",
          "Mesero", "Panadero", "Parrillero", "Repostero", "Sommelier", "Tortillero"
        ]
      },
      {
        cat: "💄 Belleza, Estética y Bienestar",
        color: "bg-pink-100 text-pink-800",
        items: [
          "Barbero", "Estilista", "Groomer (estilista canino)", "Manicurista",
          "Maquillista", "Masajista", "Tatuador"
        ]
      },
      {
        cat: "🎨 Artes, Diseño y Oficios Artísticos",
        color: "bg-purple-100 text-purple-800",
        items: [
          "Actor", "Actor de doblaje", "Alfarero", "Animador de fiestas",
          "Artesano de fibras vegetales", "Bailarín / Bailarina", "Bordador",
          "Cantante", "Ceramista", "Creador de contenido", "Decorador de interiores",
          "Diseño de modas", "Escritor", "Fotógrafo", "Joyero", "Músico / Bandas",
          "Modelos", "Orfebre", "Serigrafista", "Tallador de piedra", "Tejedor"
        ]
      },
      {
        cat: "🐶 Cuidado de Personas y Animales",
        color: "bg-green-100 text-green-800",
        items: [
          "Entrenador canino", "Gericultor (cuidado de adultos mayores)",
          "Niñera", "Paseador de perros"
        ]
      },
      {
        cat: "🏋️ Deportes, Entrenamiento e Instrucción",
        color: "bg-orange-100 text-orange-800",
        items: [
          "Árbitro de ajedrez", "Árbitro de fútbol", "Árbitro de fútbol americano",
          "Árbitro de hockey", "Árbitro de voleibol", "Entrenador de armwrestling",
          "Entrenador de boxeo", "Entrenador de calistenia", "Entrenador de fútbol",
          "Entrenador de gimnasia", "Entrenador personal", "Instructor de buceo",
          "Instructor de paracaidismo", "Maestro de yoga", "Maestro de zumba"
        ]
      },
      {
        cat: "🏥 Salud y Laboratorio",
        color: "bg-red-100 text-red-800",
        items: [
          "Criminalista", "Experto en higiene forense", "Laboratorista dental",
          "Optometrista", "Radiólogo", "Técnico dental", "Técnicos en laboratorio"
        ]
      },
      {
        cat: "🧾 Administración, Finanzas y Oficina",
        color: "bg-indigo-100 text-indigo-800",
        items: [
          "Archivista", "Asistente administrativa", "Asistente personal", "Cajero",
          "Corrector de texto", "Líder sindical", "Representante de atención al cliente",
          "Técnico de RRHH", "Técnico en contabilidad", "Técnico en finanzas",
          "Técnico en informática", "Valuador", "Vendedor"
        ]
      },
      {
        cat: "🛡️ Seguridad, Emergencias e Investigación",
        color: "bg-blue-100 text-blue-800",
        items: [
          "Bombero", "Guardaespaldas", "Inspector privado", "Personal de seguridad", "Vigilante"
        ]
      },
      {
        cat: "🌾 Campo y Producción",
        color: "bg-emerald-100 text-emerald-800",
        items: [
          "Agricultor", "Apicultor", "Granjero"
        ]
      },
      {
        cat: "🎉 Eventos, Turismo y Servicios Especiales",
        color: "bg-amber-100 text-amber-800",
        items: [
          "Agente aduanal", "Agente de viajes", "Botarguero", "Cambiador de publicidad",
          "Enterrador", "Guía de turistas", "Mayordomo", "Organizador de eventos",
          "Sustituto de filas", "Ufólogo"
        ]
      }
    ];

    let allCards = [];

    function render(list) {
      const grid = document.getElementById('categories-grid');
      const noResults = document.getElementById('no-results');
      grid.innerHTML = '';

      const grouped = {};
      list.forEach(({ cat, color, oficio }) => {
        if (!grouped[cat]) grouped[cat] = { color, oficios: [] };
        grouped[cat].oficios.push(oficio);
      });

      if (!Object.keys(grouped).length) {
        noResults.classList.remove('hidden');
        return;
      }
      noResults.classList.add('hidden');

      for (const [cat, { color, oficios }] of Object.entries(grouped)) {
        const section = document.createElement('div');
        section.innerHTML = `
          <h2 class="text-lg font-bold text-gray-700 mb-3">${cat}</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"></div>`;
        const cardGrid = section.querySelector('.grid');

        oficios.forEach(oficio => {
          const a = document.createElement('a');
          a.href = `listing.html?category=${encodeURIComponent(oficio)}`;
          a.className = 'card bg-white rounded-xl p-4 shadow-sm flex items-center gap-3';
          a.innerHTML = `
            <span class="pill ${color}">${cat.slice(0,2)}</span>
            <span class="text-sm font-medium text-gray-800">${oficio}</span>
            <i class="fas fa-chevron-right text-gray-300 ml-auto text-xs"></i>`;
          cardGrid.appendChild(a);
        });

        grid.appendChild(section);
      }
    }

    function buildAllCards() {
      return OFICIOS.flatMap(({ cat, color, items }) =>
        items.map(oficio => ({ cat, color, oficio }))
      );
    }

    // Búsqueda con debounce
    let timer;
    document.getElementById('search').addEventListener('input', function () {
      clearTimeout(timer);
      timer = setTimeout(() => {
        const q = this.value.toLowerCase().trim();
        render(q ? allCards.filter(c => c.oficio.toLowerCase().includes(q) || c.cat.toLowerCase().includes(q)) : allCards);
      }, 200);
    });

    allCards = buildAllCards();
    render(allCards);
  </script>
</body>
</html>
