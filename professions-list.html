<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Encuentra el profesionista que necesitas en COLMENA HUB. Ingenieros, médicos, abogados, contadores y más.">
  <title>Profesionistas – COLMENA HUB</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background:#FFFBEB; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    .card { transition:all .25s ease; border-left:4px solid transparent; }
    .card:hover { transform:translateY(-3px); border-left-color:#FBBF24; box-shadow:0 8px 24px rgba(251,191,36,.15); }
    .pill { display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:600; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <img src="colmena-hubLOGO.png" alt="COLMENA HUB" class="h-10 w-auto">
        <span class="font-bold text-xl text-gray-900">COLMENA HUB</span>
      </a>
      <a href="apply.html" class="text-sm font-medium text-amber-600 hover:text-amber-700">
        <i class="fas fa-user-plus mr-1"></i>Regístrate como profesional
      </a>
    </div>
  </header>

  <!-- Búsqueda -->
  <div class="bg-gradient-to-r from-amber-500 to-yellow-400 py-10 px-4">
    <div class="max-w-2xl mx-auto text-center">
      <h1 class="text-3xl font-bold text-black mb-2">Profesionistas Verificados</h1>
      <p class="text-yellow-300 mb-6">Ingenieros, médicos, abogados, arquitectos y más</p>
      <div class="relative">
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input id="search" type="text" placeholder="Busca por profesión, especialidad..."
               class="w-full pl-12 pr-4 py-4 rounded-xl text-gray-800 text-base shadow-lg border-0 outline-none focus:ring-2 focus:ring-white">
      </div>
    </div>
  </div>

  <!-- Categorías -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    <div id="categories-grid" class="space-y-8"></div>

    <!-- Sin resultados -->
    <div id="no-results" class="hidden text-center py-16">
      <i class="fas fa-search text-4xl text-gray-300 mb-4"></i>
      <h3 class="text-xl font-bold text-gray-600 mb-2">Sin resultados</h3>
      <p class="text-gray-500">Intenta con otro término o <a href="oficiadores.html" class="text-amber-600 underline">busca un oficio</a>.</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white mt-16">
    <div class="max-w-7xl mx-auto px-4 py-8 flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-3">
        <img src="colmena-hubLOGO.png" alt="" class="h-8 w-auto opacity-80">
        <span class="font-bold">COLMENA HUB</span>
      </div>
      <p class="text-gray-400 text-sm">© 2025 COLMENA HUB. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script>
    const PROFESIONES = [
      {
        cat: "🔬 Físico-Matemáticas e Ingenierías",
        color: "bg-blue-100 text-blue-800",
        items: [
          "Actuaría","Arquitectura","Arquitectura de Paisaje","Ciencia de Materiales Sustentables",
          "Ciencias Atmosféricas","Ciencias de la Computación","Ciencias de la Tierra","Computación",
          "Física","Física Biomédica","Geociencias","Ingeniería Aeroespacial","Ingeniería Aeronáutica",
          "Ingeniería Agrícola","Ingeniería Ambiental","Ingeniería Biomédica","Ingeniería Biónica",
          "Ingeniería Bioquímica","Ingeniería Biotecnológica","Ingeniería Civil","Ingeniería de Minas y Metalurgia",
          "Ingeniería Eléctrica","Ingeniería Electrónica","Ingeniería Eléctrica y Electrónica",
          "Ingeniería en Alimentos","Ingeniería en Computación","Ingeniería en Control y Automatización",
          "Ingeniería en Energía","Ingeniería en Energías Renovables","Ingeniería en Inteligencia Artificial",
          "Ingeniería en Robótica Industrial","Ingeniería en Sistemas Automotrices",
          "Ingeniería en Telecomunicaciones","Ingeniería en Telecomunicaciones, Sistemas y Electrónica",
          "Ingeniería Farmacéutica","Ingeniería Ferroviaria","Ingeniería Fotónica","Ingeniería Geofísica",
          "Ingeniería Geológica","Ingeniería Geomática","Ingeniería Hidrológica","Ingeniería Industrial",
          "Ingeniería Informática","Ingeniería Matemática","Ingeniería Mecánica","Ingeniería Mecánica Eléctrica",
          "Ingeniería Mecatrónica","Ingeniería Metalúrgica","Ingeniería Petrolera","Ingeniería Química",
          "Ingeniería Química Industrial","Ingeniería Química Metalúrgica","Ingeniería Química Petrolera",
          "Ingeniería Sistemas Ambientales","Ingeniería Sistemas Computacionales",
          "Ingeniería Sistemas Energéticos y Redes Inteligentes","Ingeniería Telemática",
          "Ingeniería Topográfica y Fotogramétrica","Ingeniería Transporte","Matemáticas","Matemáticas Aplicadas",
          "Matemáticas Aplicadas y Computación","Matemáticas para el Desarrollo","Nanotecnología",
          "Tecnología","Tecnologías para la Información en Ciencias","Urbanismo"
        ]
      },
      {
        cat: "🧬 Ciencias Biológicas, Químicas y de la Salud",
        color: "bg-green-100 text-green-800",
        items: [
          "Agronomía","Bioquímica Diagnóstica","Biología","Ciencia de la Nutrición Humana",
          "Ciencia Forense","Ciencias Agroforestales","Ciencias Agrogenómicas","Ciencias Ambientales",
          "Ciencias Genómicas","Ecología","Enfermería","Enfermería y Obstetricia","Estomatología",
          "Farmacia","Fisioterapia","Investigación Biomédica Básica","Manejo Sustentable de Zonas Costeras",
          "Medicina","Medicina Veterinaria y Zootecnia","Médico Cirujano","Médico Cirujano Homeópata",
          "Médico Cirujano Partero","Neurociencias","Nutrición Humana","Nutriología","Odontología",
          "Optometría","Órtesis y Prótesis","Química","Química de Alimentos","Química Farmacéutica Biológica",
          "Químico Bacteriólogo y Parasitólogo","Químico Farmacéutico Industrial"
        ]
      },
      {
        cat: "🏛️ Ciencias Sociales",
        color: "bg-purple-100 text-purple-800",
        items: [
          "Administración","Administración Agropecuaria","Administración de Archivos y Gestión Documental",
          "Administración Industrial","Administración y Desarrollo Empresarial","Antropología",
          "Bibliotecología y Estudios de la Información","Ciencias de la Comunicación",
          "Ciencias Políticas y Administración Pública","Comunicación","Comunicación Social",
          "Comunicación y Periodismo","Contaduría","Contaduría y Finanzas Públicas","Derecho",
          "Desarrollo Comunitario para el Envejecimiento","Desarrollo Territorial","Economía",
          "Economía Industrial","Estudios Sociales y Gestión Local","Geografía","Geografía Aplicada",
          "Geohistoria","Informática","Mercadotecnia Digital","Movilidad Urbana",
          "Negocios Energéticos Sustentables","Negocios Internacionales","Planeación Territorial",
          "Planificación para el Desarrollo Agropecuario","Política y Gestión Social","Psicología",
          "Relaciones Comerciales","Relaciones Internacionales","Sociología","Sociología Aplicada",
          "Trabajo Social","Turismo y Desarrollo Sostenible"
        ]
      },
      {
        cat: "🎨 Humanidades y Artes",
        color: "bg-pink-100 text-pink-800",
        items: [
          "Arte y Diseño","Artes Visuales","Canto","Composición","Desarrollo y Gestión Interculturales",
          "Diseño de la Comunicación Gráfica","Diseño Gráfico","Diseño Industrial",
          "Diseño y Comunicación Visual","Educación Musical","Enseñanza de Inglés",
          "Enseñanza de Español como Lengua Extranjera","Enseñanza de Inglés como Lengua Extranjera",
          "Estudios Latinoamericanos","Etnomusicología","Filosofía","Historia","Historia del Arte",
          "Instrumentista","Lengua y Literaturas Hispánicas","Lengua y Literaturas Modernas Alemanas",
          "Lengua y Literaturas Modernas Francesas","Lengua y Literaturas Modernas Inglesas",
          "Lengua y Literaturas Modernas Italianas","Lengua y Literaturas Modernas Portuguesas",
          "Letras Clásicas","Lingüística Aplicada","Literatura Dramática y Teatro",
          "Literatura Intercultural","Música y Tecnología Artística","Pedagogía","Piano",
          "Teatro y Actuación","Traducción"
        ]
      }
    ];

    let allCards = [];

    function render(list) {
      const grid = document.getElementById('categories-grid');
      const noResults = document.getElementById('no-results');
      grid.innerHTML = '';

      const grouped = {};
      list.forEach(({ cat, color, prof }) => {
        if (!grouped[cat]) grouped[cat] = { color, profs: [] };
        grouped[cat].profs.push(prof);
      });

      if (!Object.keys(grouped).length) {
        noResults.classList.remove('hidden');
        return;
      }
      noResults.classList.add('hidden');

      for (const [cat, { color, profs }] of Object.entries(grouped)) {
        const section = document.createElement('div');
        section.innerHTML = `
          <h2 class="text-lg font-bold text-gray-700 mb-3">${cat}</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"></div>`;
        const cardGrid = section.querySelector('.grid');

        profs.forEach(prof => {
          const a = document.createElement('a');
          a.href = `listing.html?category=${encodeURIComponent(prof)}`;
          a.className = 'card bg-white rounded-xl p-4 shadow-sm flex items-center gap-3';
          a.innerHTML = `
            <span class="pill ${color}">${cat.slice(0,2)}</span>
            <span class="text-sm font-medium text-gray-800">${prof}</span>
            <i class="fas fa-chevron-right text-gray-300 ml-auto text-xs"></i>`;
          cardGrid.appendChild(a);
        });

        grid.appendChild(section);
      }
    }

    function buildAllCards() {
      return PROFESIONES.flatMap(({ cat, color, items }) =>
        items.map(prof => ({ cat, color, prof }))
      );
    }

    // Búsqueda con debounce
    let timer;
    document.getElementById('search').addEventListener('input', function () {
      clearTimeout(timer);
      timer = setTimeout(() => {
        const q = this.value.toLowerCase().trim();
        render(q ? allCards.filter(c => c.prof.toLowerCase().includes(q) || c.cat.toLowerCase().includes(q)) : allCards);
      }, 200);
    });

    allCards = buildAllCards();
    render(allCards);
  </script>
</body>
</html>
