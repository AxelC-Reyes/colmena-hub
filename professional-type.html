               id="searchInput"
               placeholder="Buscar profesionales..."

      </form>
      
      <!-- Resultados de búsqueda -->

        <div class="p-2 space-y-1">
          <!-- Resultados se insertan aquí -->
        </div>

      "Agente aduanal", "Agente de viajes", "Botarguero", "Cambiador de publicidad",
      "Enterrador", "Guía de turistas", "Mayordomo", "Organizador de eventos",
      "Sustituto de filas", "Ufólogo"
    ];

    // Búsqueda en vivo
    document.getElementById('searchInput').addEventListener('input', function() {
      const query = this.value.toLowerCase().trim();
      const resultsContainer = document.getElementById('searchResults');
      const resultsList = resultsContainer.querySelector('.p-2');
      
      if (!query) {
        resultsContainer.classList.add('hidden');
        return;
      }
      
      // Buscar en ambas listas
      const allItems = [
        ...profesionistas.map(item => ({ name: item, type: 'profesionista' })),
        ...oficiadores.map(item => ({ name: item, type: 'oficiador' }))
      ];
      
      const matches = allItems.filter(item => 
        item.name.toLowerCase().includes(query)
      ).slice(0, 10);
      
      if (matches.length === 0) {
        resultsList.innerHTML = `
          <div class="text-gray-500 text-sm text-center py-2">
            No se encontraron resultados
          </div>
        `;
        resultsContainer.classList.remove('hidden');
        return;
      }
      
      resultsList.innerHTML = matches.map(match => `
        <a href="${match.type === 'profesionista' ? 'professions-list.html' : 'oficiadores.html'}?search=${encodeURIComponent(match.name)}"
           class="block px-3 py-2 hover:bg-gray-100 rounded-lg transition-colors text-sm">
          <span class="text-gray-800">${match.name}</span>
          <span class="text-xs text-gray-500 ml-2">${match.type === 'profesionista' ? '🎓' : '🔧'}</span>
        </a>
      `).join('');
      
      resultsContainer.classList.remove('hidden');
    });

    // Cerrar resultados al hacer clic fuera
    document.addEventListener('click', function(e) {
      const searchContainer = document.querySelector('.w-full.max-w-md');
      if (!searchContainer.contains(e.target)) {
        document.getElementById('searchResults').classList.add('hidden');
      }
    });

    // Soporte para Enter
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        const query = this.value.trim();
        if (query) {
          // Redirigir a profesionistas por defecto
          window.location.href = `professions-list.html?search=${encodeURIComponent(query)}`;
        }
      }
    });
  </script>
